  top_vspace_in: -0.45
  section_heading_font_size_pt: 13.0
  section_heading_line_height_pt: 15.0
  section_spacing_before_pt: 1.0
  section_spacing_after_pt: 1.0
  subheading_itemsep_pt: 2.0
  bullet_itemsep_pt: 1.0
